name: RemoteControl
options:
  bundleIdPrefix: com.vs.remotecontrol
  deploymentTarget:
    iOS: "17.0"
targets:
  RemoteControl:
    type: application
    platform: iOS
    sources:
      - RemoteControl
    info:
      path: RemoteControl/Info.plist
    settings:
      base:
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
